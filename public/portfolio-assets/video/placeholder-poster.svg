<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#131a24"/>
  <rect x="0" y="0" width="1280" height="3" fill="url(#top)"/>
  <defs>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7df9ff"/>
    </linearGradient>
  </defs>
  <!-- Grid lines -->
  <g stroke="rgba(0,229,255,0.07)" stroke-width="1">
    <line x1="0" y1="90" x2="1280" y2="90"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="270" x2="1280" y2="270"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="450" x2="1280" y2="450"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
    <line x1="0" y1="630" x2="1280" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
    <line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>
  <!-- Play circle -->
  <circle cx="640" cy="360" r="72" fill="rgba(0,229,255,0.12)" stroke="rgba(0,229,255,0.45)" stroke-width="2"/>
  <!-- Play triangle -->
  <polygon points="622,330 622,390 678,360" fill="#00e5ff"/>
  <!-- Label -->
  <text x="640" y="476" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" fill="rgba(107,122,149,0.8)" letter-spacing="3">REPLACE WITH VIDEO POSTER</text>
  <text x="640" y="500" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="rgba(107,122,149,0.5)" letter-spacing="2">public/portfolio-assets/video/placeholder-poster.svg</text>
</svg>
